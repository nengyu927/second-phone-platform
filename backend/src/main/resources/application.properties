spring.application.name=second-phone-platform
server.port=8080

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/second_phone_platform?useSSL=false&serverTimezone=Asia/Taipei&characterEncoding=utf8}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

app.jwt.secret=${APP_JWT_SECRET:}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

app.admin.username=${APP_ADMIN_USERNAME:admin}
app.admin.email=${APP_ADMIN_EMAIL:admin@example.com}
app.admin.password=${APP_ADMIN_PASSWORD:}

app.upload-dir=${APP_UPLOAD_DIR:uploads}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB
